<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Orchestration modes">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="agentic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#5b3fd6"/>
    </linearGradient>
    <linearGradient id="stable" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f4d3d"/>
      <stop offset="100%" stop-color="#2e7d5b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" rx="28" fill="url(#bg2)"/>
  <text x="60" y="56" fill="#ffffff" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">Orchestration modes</text>
  <text x="60" y="86" fill="#a8b3c7" font-size="16" font-family="Inter, Arial, sans-serif">Same data, different control flow</text>

  <g font-family="Inter, Arial, sans-serif" fill="#ffffff">
    <rect x="80" y="130" width="430" height="120" rx="22" fill="url(#agentic)" stroke="#9f8cff"/>
    <text x="295" y="165" text-anchor="middle" font-size="22" font-weight="700">Agentic</text>
    <text x="295" y="193" text-anchor="middle" font-size="14" fill="#e8e1ff">rewrite → route → critique → repeat</text>
    <text x="295" y="217" text-anchor="middle" font-size="14" fill="#e8e1ff">best for flexible reasoning, but slower</text>

    <rect x="690" y="130" width="430" height="120" rx="22" fill="url(#stable)" stroke="#7ad7ad"/>
    <text x="905" y="165" text-anchor="middle" font-size="22" font-weight="700">Stable</text>
    <text x="905" y="193" text-anchor="middle" font-size="14" fill="#ddfff0">route → answer</text>
    <text x="905" y="217" text-anchor="middle" font-size="14" fill="#ddfff0">lighter and more predictable</text>
  </g>

  <g stroke="#c7d2e1" stroke-width="4" fill="none">
    <path d="M520 190 C575 190, 620 190, 670 190"/>
    <path d="M670 190 l-16 -10"/>
    <path d="M670 190 l-16 10"/>
  </g>
</svg>
